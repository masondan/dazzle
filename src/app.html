<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#AA0171" />
		<meta name="description" content="Sales & inventory tracker for Dazzle by Dorah — manage stock, orders, and customers." />
		<meta name="robots" content="noindex, nofollow" />

		<!-- Favicons -->
		<link rel="icon" href="/logos/logo-dazzle-favicon.ico" sizes="48x48" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />

		<!-- Web App Manifest -->
		<link rel="manifest" href="/manifest.webmanifest" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Dazzle by Dorah" />
		<meta property="og:description" content="A small but shiny sales & stock tracker." />
		<meta property="og:image" content="https://dazzlebydorah.pages.dev/logos/logo-dazzle-og.png" />
		<meta property="og:url" content="https://dazzlebydorah.pages.dev" />

		<!-- Twitter / WhatsApp -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Dazzle by Dorah" />
		<meta name="twitter:description" content="A small but shiny sales & stock tracker." />
		<meta name="twitter:image" content="https://dazzlebydorah.pages.dev/logos/logo-dazzle-og.png" />

		<!-- iOS Web App -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="Dazzle" />

		<title>Dazzle by Dorah — Sales & Inventory</title>
		%sveltekit.head%
	</head>
	<body>
		<div>%sveltekit.body%</div>
	</body>
</html>
